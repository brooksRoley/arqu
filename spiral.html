<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Spiral Gravity Metronome Canvas</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #05060a;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      user-select: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    .hud {
      position: fixed;
      left: 14px;
      top: 12px;
      color: rgba(255,255,255,0.72);
      font-size: 12px;
      letter-spacing: 0.2px;
      line-height: 1.35;
      pointer-events: none;
      mix-blend-mode: screen;
      text-shadow: 0 0 12px rgba(255,255,255,0.08);
    }
    .hud b { color: rgba(255,255,255,0.9); font-weight: 600; }
    .hint {
      position: fixed;
      right: 14px;
      bottom: 12px;
      color: rgba(255,255,255,0.55);
      font-size: 12px;
      pointer-events: none;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud">
    <div><b>Spiral Gravity Metronome</b></div>
    <div>Move mouse: wave-bounce + gravity tug</div>
    <div>Click: change variation (and pulse sound)</div>
  </div>
  <div class="hint">Tip: click once to enable audio</div>

  <script>
    // ---------- Utilities ----------
    const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
    const lerp  = (a, b, t) => a + (b - a) * t;
    const TAU = Math.PI * 2;

    // Deterministic-ish hash/noise (cheap pseudo-random)
    function hash2(x, y) {
      // integer-ish mix
      let n = (x * 374761393 + y * 668265263) ^ (x * y);
      n = (n ^ (n >> 13)) * 1274126177;
      return ((n ^ (n >> 16)) >>> 0) / 4294967295;
    }

    // ---------- Canvas Setup ----------
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: false });

    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(2, window.devicePixelRatio || 1);
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener("resize", resize);
    resize();

    // ---------- Interaction ----------
    const mouse = {
      x: W * 0.5,
      y: H * 0.5,
      vx: 0,
      vy: 0,
      px: W * 0.5,
      py: H * 0.5,
      down: false,
      energy: 0
    };

    window.addEventListener("pointermove", (e) => {
      const nx = e.clientX;
      const ny = e.clientY;
      mouse.vx = (nx - mouse.px);
      mouse.vy = (ny - mouse.py);
      mouse.px = nx; mouse.py = ny;
      mouse.x = nx; mouse.y = ny;
      const v = Math.hypot(mouse.vx, mouse.vy);
      mouse.energy = lerp(mouse.energy, clamp(v / 40, 0, 2), 0.35);
      // inject wave kick
      injectWave(nx, ny, mouse.vx, mouse.vy);
    }, { passive: true });

    window.addEventListener("pointerdown", () => {
      mouse.down = true;
      cycleVariant();
      clickPulse();
    }, { passive: true });

    window.addEventListener("pointerup", () => {
      mouse.down = false;
    }, { passive: true });

    // ---------- Variations / Presets ----------
    const variants = [
      {
        name: "Solar-dominant (tight spiral)",
        rot: 1.35,
        gravitySolar: 1.0,
        gravityDark: 0.35,
        diffusion: 0.72,
        squareCount: 720,
        layers: 3,
        fractalBias: 0.62,
        metronomeBpm: 84
      },
      {
        name: "Dark-dominant (wide ring collapse)",
        rot: 0.95,
        gravitySolar: 0.55,
        gravityDark: 1.05,
        diffusion: 0.80,
        squareCount: 820,
        layers: 4,
        fractalBias: 0.74,
        metronomeBpm: 72
      },
      {
        name: "Binary gravities (double vortex)",
        rot: 1.15,
        gravitySolar: 0.85,
        gravityDark: 0.85,
        diffusion: 0.76,
        squareCount: 880,
        layers: 4,
        fractalBias: 0.68,
        metronomeBpm: 96
      },
      {
        name: "Factorial burst (dense groups)",
        rot: 1.55,
        gravitySolar: 0.95,
        gravityDark: 0.65,
        diffusion: 0.70,
        squareCount: 980,
        layers: 5,
        fractalBias: 0.58,
        metronomeBpm: 108
      },
      {
        name: "Quiet drift (soft diffusion)",
        rot: 0.75,
        gravitySolar: 0.60,
        gravityDark: 0.55,
        diffusion: 0.86,
        squareCount: 640,
        layers: 3,
        fractalBias: 0.80,
        metronomeBpm: 60
      },
    ];
    let variantIndex = 0;
    let V = variants[variantIndex];

    function cycleVariant() {
      variantIndex = (variantIndex + 1) % variants.length;
      V = variants[variantIndex];
      // nudge visual reset feel
      spiralPhase += 0.8;
      kick = 1.0;
      setMetronome(V.metronomeBpm);
    }

    // ---------- Wave Field (background “bounce”) ----------
    // Lightweight discrete wave sim on a small grid
    const grid = {
      w: 120,
      h: 72,
      a: null,  // current height
      b: null,  // previous height
      damp: 0.985
    };

    function initGrid() {
      grid.a = new Float32Array(grid.w * grid.h);
      grid.b = new Float32Array(grid.w * grid.h);
    }
    initGrid();

    function injectWave(x, y, vx, vy) {
      const gx = Math.floor((x / W) * grid.w);
      const gy = Math.floor((y / H) * grid.h);
      if (gx < 1 || gy < 1 || gx >= grid.w - 1 || gy >= grid.h - 1) return;
      const mag = clamp(Math.hypot(vx, vy) / 50, 0, 1.2);
      const idx = gy * grid.w + gx;
      grid.a[idx] += mag * 1.8;
      // little cluster injection
      grid.a[idx + 1] += mag * 0.7;
      grid.a[idx - 1] += mag * 0.7;
      grid.a[idx + grid.w] += mag * 0.7;
      grid.a[idx - grid.w] += mag * 0.7;
      waveEnergy = clamp(waveEnergy + mag * 0.35, 0, 2.5);
    }

    function stepWaves() {
      const w = grid.w, h = grid.h;
      const a = grid.a, b = grid.b;
      // classic ripple: new = (neighbors avg*2 - old) * damp
      for (let y = 1; y < h - 1; y++) {
        let row = y * w;
        for (let x = 1; x < w - 1; x++) {
          const i = row + x;
          const n = (a[i - 1] + a[i + 1] + a[i - w] + a[i + w]) * 0.5;
          const v = (n - b[i]) * grid.damp;
          b[i] = v;
        }
      }
      // swap
      grid.a = b;
      grid.b = a;

      // decay “energy meter” used for sound/visual coupling
      waveEnergy = lerp(waveEnergy, 0, 0.03);
    }

    function sampleWave(nx, ny) {
      // bilinear-ish sample from grid.a
      const x = clamp(nx * (grid.w - 1), 0, grid.w - 1);
      const y = clamp(ny * (grid.h - 1), 0, grid.h - 1);
      const x0 = x | 0, y0 = y | 0;
      const x1 = Math.min(x0 + 1, grid.w - 1);
      const y1 = Math.min(y0 + 1, grid.h - 1);
      const tx = x - x0, ty = y - y0;
      const a = grid.a;
      const i00 = y0 * grid.w + x0;
      const i10 = y0 * grid.w + x1;
      const i01 = y1 * grid.w + x0;
      const i11 = y1 * grid.w + x1;
      const v0 = a[i00] * (1 - tx) + a[i10] * tx;
      const v1 = a[i01] * (1 - tx) + a[i11] * tx;
      return v0 * (1 - ty) + v1 * ty;
    }

    // ---------- Audio (WebAudio) ----------
    let audio = {
      ctx: null,
      master: null,
      metroGain: null,
      shimmerGain: null,
      metroOsc: null,
      shimmerNoise: null,
      shimmerFilter: null,
      bpm: 84,
      nextTick: 0,
      enabled: false,
      lastTime: 0
    };

    function ensureAudio() {
      if (audio.enabled) return true;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return false;

      const ctxA = new AC();
      audio.ctx = ctxA;

      const master = ctxA.createGain();
      master.gain.value = 0.0; // fade in after user gesture
      master.connect(ctxA.destination);
      audio.master = master;

      // Metronome tone: sine -> short envelope
      audio.metroGain = ctxA.createGain();
      audio.metroGain.gain.value = 0.0;
      audio.metroGain.connect(master);

      // Shimmer: filtered noise
      const noiseBuf = ctxA.createBuffer(1, ctxA.sampleRate * 2, ctxA.sampleRate);
      const data = noiseBuf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.35;

      const noise = ctxA.createBufferSource();
      noise.buffer = noiseBuf;
      noise.loop = true;

      const filter = ctxA.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 650;
      filter.Q.value = 1.2;

      const shimmerGain = ctxA.createGain();
      shimmerGain.gain.value = 0.0;

      noise.connect(filter);
      filter.connect(shimmerGain);
      shimmerGain.connect(master);

      noise.start();

      audio.shimmerNoise = noise;
      audio.shimmerFilter = filter;
      audio.shimmerGain = shimmerGain;

      setMetronome(V.metronomeBpm);

      // Fade master in gently
      const t = ctxA.currentTime;
      master.gain.setValueAtTime(0.0, t);
      master.gain.linearRampToValueAtTime(0.55, t + 0.35);

      audio.enabled = true;
      return true;
    }

    function setMetronome(bpm) {
      audio.bpm = bpm;
      if (!audio.ctx) return;
      audio.nextTick = audio.ctx.currentTime + 0.05;
    }

    function scheduleMetronome(now) {
      if (!audio.ctx) return;
      const ctxA = audio.ctx;
      const beat = 60 / audio.bpm;

      while (audio.nextTick < now + 0.15) {
        // Create a short tick oscillator
        const osc = ctxA.createOscillator();
        osc.type = "sine";
        // pitch coupled to current variant & energy
        const base = 260 + (variantIndex * 35);
        const wobble = 55 * clamp(waveEnergy, 0, 1.6) + 30 * mouse.energy;
        osc.frequency.value = base + wobble;

        const g = ctxA.createGain();
        g.gain.setValueAtTime(0.0001, audio.nextTick);
        g.gain.exponentialRampToValueAtTime(0.25, audio.nextTick + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, audio.nextTick + 0.06);

        osc.connect(g);
        g.connect(audio.metroGain);

        // metroGain follows overall intensity slightly
        const mg = clamp(0.10 + 0.10 * waveEnergy + 0.06 * mouse.energy, 0.06, 0.26);
        audio.metroGain.gain.setTargetAtTime(mg, audio.nextTick, 0.02);

        osc.start(audio.nextTick);
        osc.stop(audio.nextTick + 0.08);

        audio.nextTick += beat;
      }
    }

    function updateShimmer(now) {
      if (!audio.ctx) return;
      // shimmer intensity and bandpass frequency correlate with wave field / kick
      const intensity = clamp(0.02 + 0.10 * waveEnergy + 0.06 * mouse.energy + 0.08 * kick, 0, 0.22);
      audio.shimmerGain.gain.setTargetAtTime(intensity, now, 0.05);

      const f = 420 + 380 * clamp(waveEnergy, 0, 1.8) + 120 * Math.sin(spiralPhase * 0.7);
      audio.shimmerFilter.frequency.setTargetAtTime(f, now, 0.06);
      audio.shimmerFilter.Q.setTargetAtTime(0.9 + 1.6 * clamp(mouse.energy, 0, 1.5), now, 0.06);
    }

    function clickPulse() {
      ensureAudio();
      if (!audio.ctx) return;
      // quick audible “variation switch” blip by spiking shimmer + lowering filter briefly
      const t = audio.ctx.currentTime;
      audio.shimmerGain.gain.cancelScheduledValues(t);
      audio.shimmerGain.gain.setValueAtTime(audio.shimmerGain.gain.value, t);
      audio.shimmerGain.gain.linearRampToValueAtTime(0.22, t + 0.02);
      audio.shimmerGain.gain.linearRampToValueAtTime(0.05, t + 0.14);
    }

    // ---------- Visual System: Spiral + Square Groups + “fractal diffusion” ----------
    let t0 = performance.now();
    let spiralPhase = 0;
    let kick = 0;      // click/impact envelope
    let waveEnergy = 0;

    function drawBackground() {
      // subtle trailing background, reacts to wave energy
      const fade = 0.08 + 0.06 * clamp(waveEnergy, 0, 1.5);
      ctx.fillStyle = `rgba(5,6,10,${fade})`;
      ctx.fillRect(0, 0, W, H);
    }

    function drawWaves() {
      // render a faint wave mesh as moving “dark matter ripples”
      const stepX = Math.max(18, Math.floor(W / 46));
      const stepY = Math.max(18, Math.floor(H / 30));

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.lineWidth = 1;

      const alpha = 0.08 + 0.10 * clamp(waveEnergy, 0, 1.8);
      ctx.strokeStyle = `rgba(160,190,255,${alpha})`;

      ctx.beginPath();
      for (let y = 0; y <= H; y += stepY) {
        for (let x = 0; x <= W; x += stepX) {
          const nx = x / W, ny = y / H;
          const wv = sampleWave(nx, ny);
          const dx = (wv * 12) * (0.35 + 0.65 * clamp(mouse.energy, 0, 1.5));
          const dy = (wv * 12) * (0.35 + 0.65 * clamp(mouse.energy, 0, 1.5));
          const px = x + dx;
          const py = y + dy;

          if (x === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
      }
      ctx.stroke();

      // second pass rotated feel
      ctx.strokeStyle = `rgba(255,170,220,${alpha * 0.65})`;
      ctx.beginPath();
      for (let x = 0; x <= W; x += stepX) {
        for (let y = 0; y <= H; y += stepY) {
          const nx = x / W, ny = y / H;
          const wv = sampleWave(nx, ny);
          const dx = (wv * 10);
          const py = y + dx;
          const px = x - dx;
          if (y === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
      }
      ctx.stroke();

      ctx.restore();
    }

    function drawSpiralSquares(time) {
      const cx = W * 0.5, cy = H * 0.5;

      // Two “gravity wells”: solar + dark matter (dark offsets depend on variant)
      const darkOffsetR = Math.min(W, H) * (0.16 + 0.04 * Math.sin(spiralPhase * 0.6));
      const darkAngle = spiralPhase * (0.85 + 0.25 * V.rot);
      const darkX = cx + Math.cos(darkAngle) * darkOffsetR;
      const darkY = cy + Math.sin(darkAngle) * darkOffsetR;

      // mouse acts like a third temporary well
      const mx = mouse.x, my = mouse.y;

      // overall swirl
      const baseRot = spiralPhase * V.rot;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      // “factorial-ish” group sizes using n! growth compressed into a repeating pattern
      function factorialLike(n) {
        // grows quickly then wraps via tanh
        let f = 1;
        for (let i = 2; i <= n; i++) f *= i;
        // compress huge numbers smoothly
        return Math.tanh(f / 50);
      }

      const N = V.squareCount;
      const layers = V.layers;

      for (let layer = 0; layer < layers; layer++) {
        const layerT = layer / Math.max(1, layers - 1);
        const layerRot = baseRot * (0.6 + 0.9 * layerT);
        const layerAlpha = 0.05 + 0.10 * (1 - layerT);
        const layerGlow = 0.10 + 0.15 * layerT;

        for (let i = 0; i < N / layers; i++) {
          const k = i + layer * 997; // offset per layer for different hash
          const u = (i + 1) / (N / layers);

          // radius spirals inward, with diffusion noise + wave sampling
          const wave = sampleWave((i * 19 % W) / W, (i * 31 % H) / H);
          const noise = (hash2(k, layer) - 0.5);
          const diffusion = (noise * 0.6 + wave * 0.35) * V.diffusion;

          // inward radius curve (spiral)
          const r0 = Math.min(W, H) * (0.55 + 0.35 * (1 - layerT));
          const r = r0 * (1 - u * (0.88 + 0.05 * layerT)) * (1 + diffusion * 0.18);

          // spiral angle with “fractal” modulation
          const fract = Math.sin((u * 18 + layer * 2.5) * (1.2 + 1.6 * V.fractalBias) + layerRot);
          const theta = layerRot + u * TAU * (2.4 + 1.8 * layerT) + fract * (0.35 + 0.35 * V.fractalBias);

          // base position on spiral
          let x = cx + Math.cos(theta) * r;
          let y = cy + Math.sin(theta) * r;

          // gravitational tug toward solar/dark/mouse wells (with inverse-ish falloff)
          function pullTo(px, py, strength) {
            const dx = px - x, dy = py - y;
            const d2 = dx * dx + dy * dy + 80;
            const inv = 1 / Math.sqrt(d2);
            const a = strength * inv;
            x += dx * a;
            y += dy * a;
          }

          pullTo(cx, cy, 0.020 * V.gravitySolar);
          pullTo(darkX, darkY, 0.020 * V.gravityDark);
          pullTo(mx, my, 0.010 * (0.35 + 0.65 * clamp(mouse.energy, 0, 1.8)));

          // group logic (square clusters) using factorial-like step pattern
          const g = 2 + Math.floor(7 * factorialLike(2 + (i % 7)));
          const groupPhase = (i % g) / g;

          // square size modulated by radius + diffusion + kick
          const sBase = 1.2 + (1 - u) * (7.0 + 8.0 * layerT);
          const s = sBase * (0.70 + 0.60 * Math.abs(fract)) * (1 + 0.35 * kick);

          // orientation & “square fractal” recursion feel by drawing nested squares
          const rot = theta * (0.8 + 0.6 * layerT) + (groupPhase - 0.5) * 1.4;

          // color: solar vs dark matter blend based on proximity
          const ds = Math.hypot(x - cx, y - cy);
          const dd = Math.hypot(x - darkX, y - darkY);
          const blend = clamp((dd - ds) / 250, -1, 1); // negative => solar, positive => dark
          const solarA = 0.55 + 0.45 * (1 - layerT);
          const darkA  = 0.45 + 0.55 * layerT;

          // subtle mouse wave bounce moves positions a bit
          const wBounce = sampleWave(x / W, y / H) * (8 + 18 * clamp(mouse.energy, 0, 1.8));
          x += Math.cos(theta + 1.7) * wBounce * 0.12;
          y += Math.sin(theta + 1.7) * wBounce * 0.12;

          // draw cluster of squares
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);

          // composite alpha
          const a = layerAlpha * (0.55 + 0.65 * Math.abs(fract)) * (0.8 + 0.4 * clamp(waveEnergy, 0, 2.0));
          // two-tone “solar / dark” blending (without heavy color control)
          // Using rgba with mild warm/cool interplay
          const warm = `rgba(255, 200, 160, ${a * solarA})`;
          const cool = `rgba(160, 190, 255, ${a * darkA})`;
          const tone = (blend < 0) ? warm : cool;

          ctx.strokeStyle = tone;
          ctx.lineWidth = 1;

          // nested “fractal-ish” squares
          const nest = 2 + ((i + layer) % 3);
          for (let n = 0; n < nest; n++) {
            const t = n / nest;
            const ss = s * (1 - t * (0.55 + 0.25 * V.fractalBias));
            const o = (n + 1) * (0.9 + 0.25 * layerT);

            // offset gives “diffusion” clusters
            const ox = (hash2(k + n * 13, layer + n * 17) - 0.5) * (2.4 + 5.0 * (1 - u)) * (0.35 + 0.65 * V.diffusion);
            const oy = (hash2(k + n * 19, layer + n * 23) - 0.5) * (2.4 + 5.0 * (1 - u)) * (0.35 + 0.65 * V.diffusion);

            ctx.globalAlpha = 1.0;
            ctx.strokeRect(-ss * 0.5 + ox * o, -ss * 0.5 + oy * o, ss, ss);

            // occasional filled core “matter” flecks
            if ((i + n + layer) % 11 === 0) {
              ctx.fillStyle = `rgba(255,255,255,${a * layerGlow * 0.55})`;
              ctx.fillRect(-1.2 + ox, -1.2 + oy, 2.4, 2.4);
            }
          }

          ctx.restore();
        }
      }

      // draw gravity cores
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const coreA = 0.08 + 0.18 * clamp(waveEnergy + kick, 0, 2);
      ctx.fillStyle = `rgba(255,220,170,${coreA})`;
      ctx.beginPath(); ctx.arc(cx, cy, 18 + 22 * kick, 0, TAU); ctx.fill();

      ctx.fillStyle = `rgba(160,190,255,${coreA * 0.95})`;
      ctx.beginPath(); ctx.arc(darkX, darkY, 14 + 26 * kick, 0, TAU); ctx.fill();

      // mouse “lens”
      const mA = 0.03 + 0.06 * clamp(mouse.energy, 0, 2);
      ctx.strokeStyle = `rgba(255,255,255,${mA})`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(mx, my, 22 + 10 * mouse.energy, 0, TAU); ctx.stroke();
      ctx.restore();

      ctx.restore();
    }

    function drawTextOverlay() {
      // small unobtrusive variant name
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.font = "12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial";
      ctx.fillText(`Variation: ${V.name}  |  BPM: ${V.metronomeBpm}`, 14, 72);
      ctx.restore();
    }

    // ---------- Main Loop ----------
    function frame(nowMs) {
      const dt = Math.min(0.033, (nowMs - t0) / 1000);
      t0 = nowMs;

      // physics-ish updates
      stepWaves();
      spiralPhase += dt * (0.7 + 0.35 * V.rot);
      kick = lerp(kick, 0, 0.06);

      // render
      drawBackground();
      drawWaves();
      drawSpiralSquares(nowMs / 1000);
      drawTextOverlay();

      // audio coupling
      if (audio.enabled && audio.ctx) {
        const now = audio.ctx.currentTime;
        scheduleMetronome(now);
        updateShimmer(now);
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // Start audio on first user click/gesture
    window.addEventListener("pointerdown", () => {
      ensureAudio();
    }, { passive: true });
  </script>
</body>
</html>
