# Render.io Blueprint — auto-deploys from GitHub
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: channelzero-api
    runtime: python
    plan: free
    region: ohio
    rootDir: server
    buildCommand: pip install -r requirements.txt && python -m app.migrate
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SERVER_ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://channelzero.vercel.app
      - key: PYTHON_VERSION
        value: "3.12"
