  - main [ref=e46]:
    - main [ref=e47]:
      - heading "About ChannelZero" [level=1] [ref=e49]
      - generic [ref=e50]:
        - paragraph [ref=e51]: ChannelZero is an Enfractionation platform — a small set of tools that work together to make a person more receptive to suggestion. It combines brainwave entrainment (binaural and isochronic audio), trance induction through visual fixation and pacing, and reading-assisted suggestion via a phrase-paced text reader.
        - paragraph [ref=e52]: "Each tool can be used on its own. Used together, they layer: a steady binaural carrier, a slow visual rhythm, and language delivered at the edge of attention."
      - generic [ref=e53]:
        - heading "How to use this site" [level=2] [ref=e54]
        - list [ref=e55]:
          - listitem [ref=e56]:
            - text: Start with
            - link "Learn" [ref=e57] [cursor=pointer]:
              - /url: /learn
            - text: to understand the concepts before opening a session.
          - listitem [ref=e58]:
            - text: Use
            - link "Sessions" [ref=e59] [cursor=pointer]:
              - /url: /sessions
            - text: to access the tools directly when you know what you want.
          - listitem [ref=e60]:
            - text: Take the poll on the
            - link "home page" [ref=e61] [cursor=pointer]:
              - /url: /
            - text: for a recommended session matched to your current state.
      - generic [ref=e62]:
        - heading "This is not medical advice" [level=2] [ref=e63]
        - paragraph [ref=e64]: ChannelZero is not a medical device and does not diagnose, treat, or cure any condition. Do not use binaural audio, strobing visuals, or trance sessions if you have epilepsy, a seizure disorder, or any condition that could be aggravated by altered states. Do not use while driving or operating machinery. If something here makes you feel unwell, stop.